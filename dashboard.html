<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Użytkownika</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #87868b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
        .welcome-msg { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        .image-card {
            background-color: #121214;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #232329;
            margin-bottom: 2rem;
        }
        h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            max-height: 400px;
            object-fit: cover;
        }
        .navigation {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-danger { background-color: #transparent; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background-color: rgba(239, 68, 68, 0.08); border-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Witaj, {{ login }}!</h2>
        <p class="welcome-msg">Udało Ci się bezpiecznie zalogować.</p>

        <div class="image-card">
            <h3>Kategoria: {{ zdjecie.opis }}</h3>
            <img src="{{ zdjecie.url }}" alt="{{ zdjecie.opis }}">
        </div>

        <div class="navigation">
            <a href="/dashboard" class="btn btn-primary">Losuj kolejne zdjęcie</a>
            <a href="/logout" class="btn btn-danger">Wyloguj się</a>
        </div>
    </div>
</body>
</html>
