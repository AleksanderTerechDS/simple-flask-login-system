<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Autentykacji</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #87868b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; font-weight: 600; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        .actions { display: flex; flex-direction: column; gap: 0.75rem; }
        .btn {
            display: block;
            padding: 0.85rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: transparent; color: var(--text-main); border: 1px solid #333238; }
        .btn-secondary:hover { background-color: #232329; border-color: #44434b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Witaj w aplikacji</h1>
        <p>Zabezpieczone logowanie i rejestracja użytkowników.</p>
        <div class="actions">
            <a href="/login" class="btn btn-primary">Zaloguj się</a>
            <a href="/register" class="btn btn-secondary">Utwórz konto</a>
        </div>
    </div>
</body>
</html>
